<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Composia</title>
<style>
  :root {
    --bg: #1e1e2e; --surface: #262637; --border: #383850;
    --text: #cdd6f4; --dim: #6c7086; --accent: #89b4fa;
    --accent2: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; display: flex; overflow: hidden; -webkit-tap-highlight-color: transparent; }

  /* Sidebar */
  .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .sidebar-header h1 { font-size: 16px; flex: 1; font-weight: 700; }
  .sidebar-header button { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .search-box { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .search-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; }
  .search-box input:focus { border-color: var(--accent); }
  .note-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .note-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; display: flex; justify-content: space-between; align-items: center; min-height: 44px; }
  .note-item:active { background: var(--bg); }
  .note-item.active { background: var(--bg); border-left: 3px solid var(--accent); }
  .note-item .tags { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .note-item .delete-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 18px; padding: 4px 8px; min-width: 32px; min-height: 32px; }

  /* Main area */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Mobile nav */
  .mobile-nav { display: none; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; gap: 12px; }
  .mobile-nav button { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 4px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .mobile-nav h2 { font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab { padding: 12px 20px; cursor: pointer; font-size: 13px; color: var(--dim); border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-weight: 600; min-height: 44px; flex: 1; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Editor */
  .editor-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .editor-panel.active { display: flex; }
  .editor-toolbar { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .editor-toolbar input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 15px; flex: 1; outline: none; }
  .editor-toolbar button { background: var(--accent2); color: var(--bg); border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 13px; font-weight: 700; min-height: 38px; }
  .editor-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .editor-content textarea { flex: 1; background: var(--bg); color: var(--text); border: none; padding: 16px; font-size: 15px; line-height: 1.7; resize: none; outline: none; -webkit-overflow-scrolling: touch; }
  .backlinks-panel { border-top: 1px solid var(--border); padding: 12px 16px; max-height: 160px; overflow-y: auto; }
  .backlinks-panel h3 { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700; }
  .backlink-item { padding: 8px 10px; font-size: 13px; color: var(--accent); cursor: pointer; border-radius: 6px; min-height: 36px; display: flex; align-items: center; }
  .backlink-item:active { background: var(--bg); }

  /* Graph */
  .graph-panel { flex: 1; display: none; position: relative; }
  .graph-panel.active { display: flex; flex-direction: column; }
  .graph-panel canvas { flex: 1; width: 100%; }
  .graph-controls { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
  .graph-controls button { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 12px; min-height: 36px; font-weight: 600; }
  .graph-info { position: absolute; bottom: 12px; left: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--dim); pointer-events: none; }
  .stats-bar { padding: 8px 16px; background: var(--surface); border-top: 1px solid var(--border); font-size: 12px; color: var(--dim); display: flex; gap: 16px; min-height: 32px; align-items: center; }

  /* Empty state */
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 14px; flex-direction: column; gap: 12px; padding: 20px; text-align: center; }

  /* Overlay for mobile sidebar */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 5; }

  /* ── Mobile ──────────────────────────────────────── */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 85%; max-width: 320px; transition: left 0.25s ease; }
    .sidebar.open { left: 0; }
    .sidebar-overlay.open { display: block; }
    .mobile-nav { display: flex; }
    .editor-content { flex-direction: column; }
    .backlinks-panel { width: auto; border-left: none; border-top: 1px solid var(--border); }
    .graph-controls { top: 8px; right: 8px; }
  }

  /* Desktop: backlinks beside editor */
  @media (min-width: 769px) {
    .editor-content { flex-direction: row; }
    .backlinks-panel { width: 240px; border-top: none; border-left: 1px solid var(--border); max-height: none; }
  }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>composia</h1>
    <button onclick="newNote(); toggleSidebar(false)">+ New</button>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search notes..." oninput="onSearch(this.value)">
  </div>
  <div class="note-list" id="noteList"></div>
</div>

<div class="main">
  <div class="mobile-nav" id="mobileNav">
    <button onclick="toggleSidebar(true)">&#9776;</button>
    <h2 id="mobileTitle">composia</h2>
    <button onclick="newNote()">+</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="editor" onclick="switchTab('editor')">Editor</button>
    <button class="tab" data-tab="graph" onclick="switchTab('graph')">Local Graph</button>
    <button class="tab" data-tab="fullgraph" onclick="switchTab('fullgraph')">Full Graph</button>
  </div>

  <div class="editor-panel active" id="editorPanel">
    <div id="editorContent" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="editor-toolbar">
        <input type="text" id="noteTitle" placeholder="Note title">
        <button onclick="saveNote()">Save</button>
      </div>
      <div class="editor-content">
        <textarea id="noteBody" placeholder="Write markdown here... use [[note-id]] to link to other notes"></textarea>
        <div class="backlinks-panel">
          <h3>Backlinks</h3>
          <div id="backlinks"></div>
        </div>
      </div>
    </div>
    <div class="empty-state" id="emptyState">
      <div style="font-size:28px;">&#127760;</div>
      <div>Select a note or create a new one</div>
      <div style="font-size:12px">Use [[wikilinks]] to connect notes (same as Obsidian)</div>
      <button onclick="seedDemo()" id="seedBtn" style="margin-top:12px; background:var(--accent); color:var(--bg); border:none; border-radius:8px; padding:10px 24px; cursor:pointer; font-size:14px; font-weight:600;">Load Demo (200+ notes)</button>
    </div>
  </div>

  <div class="graph-panel" id="graphPanel">
    <canvas id="graphCanvas"></canvas>
    <div class="graph-controls">
      <button onclick="resetGraph('graphCanvas')">Reset</button>
      <button onclick="loadLocalGraph()">Refresh</button>
    </div>
    <div class="graph-info" id="graphInfo"></div>
  </div>

  <div class="graph-panel" id="fullGraphPanel">
    <canvas id="fullGraphCanvas"></canvas>
    <div class="graph-controls">
      <button onclick="resetGraph('fullGraphCanvas')">Reset</button>
      <button onclick="loadFullGraph()">Refresh</button>
    </div>
    <div class="graph-info" id="fullGraphInfo"></div>
  </div>

  <div class="stats-bar" id="statsBar"></div>
</div>

<script>
const API = '';
let currentNote = null;
let allNotes = [];

// ── Mobile sidebar ─────────────────────────────────────
function toggleSidebar(open) {
  document.getElementById('sidebar').classList.toggle('open', open);
  document.getElementById('sidebarOverlay').classList.toggle('open', open);
}

// ── API helpers ─────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Notes ───────────────────────────────────────────────
async function loadNotes() {
  allNotes = await api('/api/notes');
  renderNoteList(allNotes);
  loadStats();
}

function renderNoteList(notes) {
  const el = document.getElementById('noteList');
  el.innerHTML = notes.map(n => `
    <div class="note-item ${currentNote?.id === n.id ? 'active' : ''}" onclick="openNote('${esc(n.id)}'); toggleSidebar(false)">
      <div>
        <div>${esc(n.title)}</div>
        ${n.tags?.length ? `<div class="tags">${n.tags.slice(0,4).map(t => '#' + t).join(' ')}</div>` : ''}
      </div>
      <button class="delete-btn" onclick="event.stopPropagation(); deleteNote('${esc(n.id)}')">&times;</button>
    </div>
  `).join('');
}

async function openNote(id) {
  try {
    currentNote = await api(`/api/notes/${encodeURIComponent(id)}`);
  } catch {
    currentNote = { id, title: id, content: '', tags: [] };
  }
  document.getElementById('noteTitle').value = currentNote.title;
  document.getElementById('noteBody').value = currentNote.content;
  document.getElementById('editorContent').style.display = 'flex';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mobileTitle').textContent = currentNote.title || id;
  renderNoteList(allNotes);
  loadBacklinks(id);
  switchTab('editor');
}

async function saveNote() {
  const id = currentNote?.id || slugify(document.getElementById('noteTitle').value);
  const note = await api('/api/notes', {
    method: 'POST',
    body: {
      id,
      title: document.getElementById('noteTitle').value,
      content: document.getElementById('noteBody').value,
    },
  });
  currentNote = note;
  await loadNotes();
  renderNoteList(allNotes);
  loadBacklinks(id);
}

async function deleteNote(id) {
  await api(`/api/notes/${encodeURIComponent(id)}`, { method: 'DELETE' });
  if (currentNote?.id === id) {
    currentNote = null;
    document.getElementById('editorContent').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('mobileTitle').textContent = 'composia';
  }
  await loadNotes();
}

function newNote() {
  const id = 'note-' + Date.now().toString(36);
  currentNote = { id, title: '', content: '' };
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteBody').value = '';
  document.getElementById('editorContent').style.display = 'flex';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('noteTitle').focus();
  switchTab('editor');
}

async function loadBacklinks(id) {
  const { backlinks } = await api(`/api/links/${encodeURIComponent(id)}`);
  const el = document.getElementById('backlinks');
  if (!backlinks.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--dim)">No backlinks yet</div>';
    return;
  }
  el.innerHTML = backlinks.map(b =>
    `<div class="backlink-item" onclick="openNote('${esc(b.source)}')">${esc(b.source)}</div>`
  ).join('');
}

function onSearch(q) {
  if (!q) return renderNoteList(allNotes);
  const lower = q.toLowerCase();
  renderNoteList(allNotes.filter(n =>
    n.title?.toLowerCase().includes(lower) ||
    n.content?.toLowerCase().includes(lower) ||
    n.tags?.some(t => t.includes(lower))
  ));
}

async function loadStats() {
  const stats = await api('/api/stats');
  document.getElementById('statsBar').textContent = `${stats.notes} notes \u00B7 ${stats.links} links`;
}

// ── Tabs ────────────────────────────────────────────────
let activeTab = 'editor';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('editorPanel').classList.toggle('active', tab === 'editor');
  document.getElementById('graphPanel').classList.toggle('active', tab === 'graph');
  document.getElementById('fullGraphPanel').classList.toggle('active', tab === 'fullgraph');
  if (tab === 'graph') loadLocalGraph();
  if (tab === 'fullgraph') loadFullGraph();
}

// ── Graph Renderer (reusable for both canvases) ─────────
function createGraphView(canvasId, infoId) {
  const state = { data: null, tx: 0, ty: 0, scale: 1, centerNodeId: null };

  function layout() {
    const { nodes, edges } = state.data;
    const canvas = document.getElementById(canvasId);
    const w = canvas.clientWidth || 800;
    const h = canvas.clientHeight || 600;
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.35;

    // Place center node (if any) at center, others in circle
    const centerIdx = state.centerNodeId ? nodes.findIndex(n => n.id === state.centerNodeId) : -1;
    nodes.forEach((n, i) => {
      if (i === centerIdx) {
        n.x = cx; n.y = cy;
      } else {
        const angle = (2 * Math.PI * i) / nodes.length;
        n.x = cx + radius * Math.cos(angle) + (Math.random() - 0.5) * 40;
        n.y = cy + radius * Math.sin(angle) + (Math.random() - 0.5) * 40;
      }
      n.vx = 0; n.vy = 0;
    });

    const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
    const iterations = Math.min(300, Math.max(100, 600 - nodes.length));

    for (let iter = 0; iter < iterations; iter++) {
      const alpha = 1 - iter / iterations;
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          let dx = nodes[j].x - nodes[i].x;
          let dy = nodes[j].y - nodes[i].y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 1;
          if (dist > 500) continue;
          let force = (600 * alpha) / (dist * dist);
          let fx = dx / dist * force;
          let fy = dy / dist * force;
          nodes[i].vx -= fx; nodes[i].vy -= fy;
          nodes[j].vx += fx; nodes[j].vy += fy;
        }
      }
      edges.forEach(e => {
        const s = nodeMap[e.source]; const t = nodeMap[e.target];
        if (!s || !t) return;
        let dx = t.x - s.x; let dy = t.y - s.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = (dist - 80) * 0.005 * alpha;
        let fx = dx / dist * force; let fy = dy / dist * force;
        s.vx += fx; s.vy += fy; t.vx -= fx; t.vy -= fy;
      });
      nodes.forEach(n => {
        // Pin center node
        if (n.id === state.centerNodeId) { n.x = cx; n.y = cy; n.vx = 0; n.vy = 0; return; }
        n.vx += (cx - n.x) * 0.0005; n.vy += (cy - n.y) * 0.0005;
        n.vx *= 0.85; n.vy *= 0.85;
        n.x += n.vx; n.y += n.vy;
      });
    }

    // Auto-fit: calculate bounding box and set initial zoom/pan
    if (nodes.length > 0) {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      nodes.forEach(n => {
        if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x;
        if (n.y < minY) minY = n.y; if (n.y > maxY) maxY = n.y;
      });
      const graphW = (maxX - minX) || 100;
      const graphH = (maxY - minY) || 100;
      const padding = 60;
      const scaleX = (w - padding * 2) / graphW;
      const scaleY = (h - padding * 2) / graphH;
      state.scale = Math.min(scaleX, scaleY, 2); // don't zoom in too much for small graphs
      const graphCx = (minX + maxX) / 2;
      const graphCy = (minY + maxY) / 2;
      state.tx = w / 2 - graphCx * state.scale;
      state.ty = h / 2 - graphCy * state.scale;
    }

    const info = document.getElementById(infoId);
    if (info) {
      const label = state.centerNodeId ? `Local: ${state.centerNodeId} \u00B7 ` : '';
      info.textContent = `${label}${nodes.length} nodes \u00B7 ${edges.length} edges`;
    }
  }

  // Transform world coords to screen coords (zoom spreads positions, not sizes)
  function toScreen(wx, wy) {
    return [wx * state.scale + state.tx, wy * state.scale + state.ty];
  }

  function draw() {
    if (!state.data) return;
    const { nodes, edges } = state.data;
    const canvas = document.getElementById(canvasId);
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
    const cw = canvas.clientWidth, ch = canvas.clientHeight;

    const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

    // Edges — constant 1px lines
    ctx.strokeStyle = '#383850';
    ctx.lineWidth = 1;
    ctx.beginPath();
    edges.forEach(e => {
      const s = nodeMap[e.source]; const t = nodeMap[e.target];
      if (!s || !t) return;
      const [sx, sy] = toScreen(s.x, s.y);
      const [tx, ty] = toScreen(t.x, t.y);
      // Skip edges fully off-screen
      if ((sx < -50 && tx < -50) || (sx > cw+50 && tx > cw+50) ||
          (sy < -50 && ty < -50) || (sy > ch+50 && ty > ch+50)) return;
      ctx.moveTo(sx, sy); ctx.lineTo(tx, ty);
    });
    ctx.stroke();

    // Nodes — constant size circles, labels appear when zoomed in enough
    const nodeRadius = 4;
    const showLabels = state.scale > 0.6;
    ctx.font = '11px -apple-system, sans-serif';

    nodes.forEach(n => {
      const [sx, sy] = toScreen(n.x, n.y);
      // Skip nodes off-screen
      if (sx < -100 || sx > cw+100 || sy < -100 || sy > ch+100) return;

      const isCenter = n.id === state.centerNodeId;
      const isActive = currentNote?.id === n.id;
      const r = isCenter ? 6 : isActive ? 5 : nodeRadius;

      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = isCenter ? '#f9e2af' : isActive ? '#a6e3a1' : '#89b4fa';
      ctx.fill();

      if (showLabels) {
        ctx.fillStyle = isCenter ? '#f9e2af' : '#6c7086';
        ctx.fillText(n.title || n.id, sx + r + 4, sy + 3);
      }
    });
  }

  function reset() { state.tx = 0; state.ty = 0; state.scale = 1; draw(); }

  // Attach interaction handlers
  const canvas = document.getElementById(canvasId);
  let dragging = false, lastX, lastY, pinchDist = 0;
  let touchMoved = false; // track if finger moved (pan/pinch vs tap)
  let wasPinching = false; // track if gesture involved 2+ fingers

  canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
  canvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    state.tx += e.clientX - lastX; state.ty += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY; draw();
  });
  canvas.addEventListener('mouseup', () => dragging = false);
  canvas.addEventListener('mouseleave', () => dragging = false);
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    state.tx = mx - (mx - state.tx) * delta;
    state.ty = my - (my - state.ty) * delta;
    state.scale = Math.max(0.05, Math.min(8, state.scale * delta));
    draw();
  }, { passive: false });

  canvas.addEventListener('click', e => {
    if (!state.data) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - state.tx) / state.scale;
    const my = (e.clientY - rect.top - state.ty) / state.scale;
    for (const n of state.data.nodes) {
      const dx = n.x - mx, dy = n.y - my;
      if (dx * dx + dy * dy < 100) { openNote(n.id); return; }
    }
  });

  canvas.addEventListener('touchstart', e => {
    touchMoved = false;
    if (e.touches.length === 1) {
      dragging = true;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    }
    if (e.touches.length === 2) {
      dragging = false;
      wasPinching = true;
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      pinchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    touchMoved = true;
    if (e.touches.length === 1 && dragging) {
      const x = e.touches[0].clientX, y = e.touches[0].clientY;
      state.tx += x - lastX; state.ty += y - lastY; lastX = x; lastY = y; draw();
    }
    if (e.touches.length === 2) {
      wasPinching = true;
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (pinchDist > 0) {
        const delta = dist / pinchDist;
        const mcx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const mcy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const rect = canvas.getBoundingClientRect();
        state.tx = (mcx - rect.left) - ((mcx - rect.left) - state.tx) * delta;
        state.ty = (mcy - rect.top) - ((mcy - rect.top) - state.ty) * delta;
        state.scale = Math.max(0.05, Math.min(8, state.scale * delta));
        draw();
      }
      pinchDist = dist;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    dragging = false;
    if (e.touches.length < 2) pinchDist = 0;
    // Only treat as tap if: single finger, didn't move, wasn't pinching
    if (e.changedTouches.length === 1 && !touchMoved && !wasPinching && state.data) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.changedTouches[0].clientX - rect.left - state.tx) / state.scale;
      const my = (e.changedTouches[0].clientY - rect.top - state.ty) / state.scale;
      for (const n of state.data.nodes) {
        const dx = n.x - mx, dy = n.y - my;
        if (dx * dx + dy * dy < 200) { openNote(n.id); return; }
      }
    }
    // Reset pinch flag only when all fingers are lifted
    if (e.touches.length === 0) wasPinching = false;
  });

  window.addEventListener('resize', () => draw());

  return { state, layout, draw, reset };
}

// Create two graph views
const localGraphView = createGraphView('graphCanvas', 'graphInfo');
const fullGraphView = createGraphView('fullGraphCanvas', 'fullGraphInfo');

async function loadLocalGraph() {
  if (!currentNote) {
    localGraphView.state.data = { nodes: [], edges: [] };
    localGraphView.draw();
    document.getElementById('graphInfo').textContent = 'Select a note to see its local graph';
    return;
  }
  const data = await api(`/api/graph/${encodeURIComponent(currentNote.id)}?depth=2`);
  localGraphView.state.data = data;
  localGraphView.state.centerNodeId = currentNote.id;
  localGraphView.layout();
  localGraphView.draw();
}

async function loadFullGraph() {
  const data = await api('/api/graph');
  fullGraphView.state.data = data;
  fullGraphView.state.centerNodeId = currentNote?.id || null;
  fullGraphView.layout();
  fullGraphView.draw();
}

function resetGraph(canvasId) {
  if (canvasId === 'graphCanvas') localGraphView.reset();
  else fullGraphView.reset();
}

// ── Keyboard shortcuts ──────────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    if (currentNote) saveNote();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    newNote();
  }
});

// Handle [[wikilink]] clicks in textarea
document.getElementById('noteBody').addEventListener('click', function(e) {
  const pos = this.selectionStart;
  const text = this.value;
  const before = text.lastIndexOf('[[', pos);
  const after = text.indexOf(']]', pos);
  if (before !== -1 && after !== -1 && after > before) {
    const inner = text.slice(before + 2, after);
    const target = inner.split('|')[0].split('#')[0].trim();
    if (target) openNote(target);
  }
});

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function slugify(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'untitled'; }

// ── Seed demo ───────────────────────────────────────────
async function seedDemo() {
  const btn = document.getElementById('seedBtn');
  btn.textContent = 'Seeding...';
  btn.disabled = true;
  try {
    await api('/api/seed', { method: 'POST' });
    await loadNotes();
    switchTab('fullgraph');
  } catch(e) {
    btn.textContent = 'Error: ' + e.message;
  }
}

// Boot
loadNotes();
